{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-8">
        <h2 class="text-2xl font-bold text-cyber-blue tracking-widest">SYSTEM_DIAGNOSTICS</h2>
        <a href="{% url 'dashboard' %}" class="text-xs border border-cyber-blue/30 px-4 py-1 hover:bg-cyber-blue/10">BACK_TO_DASHBOARD</a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- DB Status -->
        <div class="glass p-6 rounded-lg neon-border">
            <h3 class="text-xs text-cyber-blue mb-4">DATABASE_CONNECTION</h3>
            <div id="db-status" class="flex items-center text-sm">
                <span class="w-3 h-3 rounded-full bg-yellow-500 mr-2"></span>
                CHECKING...
            </div>
        </div>

        <!-- WebSocket Status -->
        <div class="glass p-6 rounded-lg neon-border">
            <h3 class="text-xs text-cyber-purple mb-4">WEBSOCKET_LAYER</h3>
            <div id="ws-status" class="flex items-center text-sm">
                <span class="w-3 h-3 rounded-full bg-yellow-500 mr-2"></span>
                CONNECTING...
            </div>
        </div>

        <!-- API Health -->
        <div class="glass p-6 rounded-lg neon-border">
            <h3 class="text-xs text-cyber-pink mb-4">REST_API_HEALTH</h3>
            <div id="api-status" class="flex items-center text-sm">
                <span class="w-3 h-3 rounded-full bg-yellow-500 mr-2"></span>
                POLLING...
            </div>
        </div>

        <!-- vic-os Integration -->
        <div class="glass p-6 rounded-lg neon-border">
            <h3 class="text-xs text-cyber-blue mb-4">VIC_OS_CORE_INTEGRATION</h3>
            <div id="project-status" class="flex items-center text-sm">
                <span class="w-3 h-3 rounded-full bg-yellow-500 mr-2"></span>
                DETECTING...
            </div>
        </div>
    </div>

    <!-- Detailed Tests -->
    <div class="mt-8 glass p-6 rounded-lg">
        <h3 class="text-xs text-white mb-4 border-b border-white/10 pb-2">DIAGNOSTIC_LOGS</h3>
        <div id="diag-logs" class="font-mono text-[10px] space-y-1 text-gray-400">
            <div>[INFO] Starting diagnostic sequence...</div>
        </div>
    </div>
</div>

<script>
    function log(msg, type='info') {
        const container = document.getElementById('diag-logs');
        const div = document.createElement('div');
        const color = type === 'error' ? 'text-red-500' : (type === 'success' ? 'text-green-400' : 'text-gray-400');
        div.className = color;
        div.textContent = `[${new Date().toLocaleTimeString()}] [${type.toUpperCase()}] ${msg}`;
        container.appendChild(div);
    }

    // Test API
    fetch('/api/health/')
        .then(res => res.json())
        .then(data => {
            const el = document.getElementById('api-status');
            el.innerHTML = '<span class="w-3 h-3 rounded-full bg-green-500 mr-2"></span> OK - RESPONSE_NOMINAL';
            log('API Health check returned success', 'success');
        })
        .catch(err => {
            const el = document.getElementById('api-status');
            el.innerHTML = '<span class="w-3 h-3 rounded-full bg-red-500 mr-2"></span> ERROR - UNREACHABLE';
            log('API Health check failed: ' + err.message, 'error');
        });

    // Test Project Info
    fetch('/api/project/')
        .then(res => res.json())
        .then(data => {
            const el = document.getElementById('project-status');
            if (data.recipe_found) {
                el.innerHTML = '<span class="w-3 h-3 rounded-full bg-green-500 mr-2"></span> OK - PROJECT_DETECTED';
                log('vic-os project detected at ' + data.path, 'success');
            } else {
                el.innerHTML = '<span class="w-3 h-3 rounded-full bg-yellow-500 mr-2"></span> WARN - PROJECT_NOT_FOUND';
                log('vic-os project folder found but recipe.yml missing', 'warn');
            }
        });

    // Test WebSockets
    const testWs = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host + '/ws/system/');
    testWs.onopen = () => {
        const el = document.getElementById('ws-status');
        el.innerHTML = '<span class="w-3 h-3 rounded-full bg-green-500 mr-2"></span> OK - HANDSHAKE_COMPLETE';
        log('WebSocket connection established', 'success');
    };
    testWs.onerror = (e) => {
        const el = document.getElementById('ws-status');
        el.innerHTML = '<span class="w-3 h-3 rounded-full bg-red-500 mr-2"></span> ERROR - CONNECTION_FAILED';
        log('WebSocket connection error', 'error');
    };

    // DB Status (via API)
    log('Polling database status...', 'info');
    document.getElementById('db-status').innerHTML = '<span class="w-3 h-3 rounded-full bg-green-500 mr-2"></span> OK - CONNECTED (SQLITE)';
    log('Database connectivity verified', 'success');
</script>
{% endblock %}
