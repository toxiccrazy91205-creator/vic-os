<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}vic-os Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            black: '#0a0a0c',
                            blue: '#00f2ff',
                            pink: '#ff00ff',
                            purple: '#7000ff',
                            dark: '#1a1a2e'
                        }
                    },
                    fontFamily: {
                        orbitron: ['Orbitron', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0c 100%);
            color: #e2e8f0;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
        }
        .glass {
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .neon-border {
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.5), inset 0 0 5px rgba(0, 242, 255, 0.2);
        }
        .cyber-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.4), transparent);
            transition: 0.5s;
        }
        .cyber-btn:hover::before {
            left: 100%;
        }
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanlines::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="scanlines">
    <div class="flex flex-col min-height-screen">
        {% if user.is_authenticated %}
        <nav class="glass border-b border-cyber-blue/30 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center">
                        <span class="text-cyber-blue font-bold text-xl tracking-widest">VIC-OS // DASHBOARD</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="text-xs text-cyber-blue/70">SESSION: {{ user.username|upper }}</span>
                        <a href="{% url 'logout' %}" class="text-cyber-pink hover:text-white transition-colors text-xs font-bold border border-cyber-pink/50 px-3 py-1 rounded">DISCONNECT</a>
                    </div>
                </div>
            </div>
        </nav>
        {% endif %}

        <main class="flex-grow p-4 md:p-8">
            {% block content %}{% endblock %}
        </main>

        <footer class="p-4 text-center text-[10px] text-gray-600 tracking-tighter">
            SYSTEM STATUS: <span class="text-cyber-blue">NOMINAL</span> | (C) 2026 VIC-OS PROJECT | ENCRYPTED LINK ESTABLISHED
        </footer>
    </div>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
