services:
  - type: web
    name: vic-os-dashboard
    env: python
    buildCommand: "./scripts/build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT vic_os_project.asgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: vic_os_project.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vicos-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".render.com"

databases:
  - name: vicos-db
    plan: free
